<div class="min-h-screen bg-[#0a0f1c] text-green-300 p-6 font-mono">

  <!-- HEADER -->
  <h1 class="text-3xl mb-6 text-green-400 tracking-widest">
    ✈️ ATC EVENT MONITOR
  </h1>

  <!-- FILTER BAR -->
  <div class="mb-6 flex gap-2 flex-wrap">
    <button (click)="setSeverityFilter('ALL')" class="px-3 py-1 border border-gray-500 rounded hover:bg-gray-700">ALL</button>
    <button (click)="setSeverityFilter('LOW')" class="px-3 py-1 bg-green-700 rounded">LOW</button>
    <button (click)="setSeverityFilter('MEDIUM')" class="px-3 py-1 bg-yellow-600 text-black rounded">MEDIUM</button>
    <button (click)="setSeverityFilter('HIGH')" class="px-3 py-1 bg-orange-600 rounded">HIGH</button>
    <button (click)="setSeverityFilter('CRITICAL')" class="px-3 py-1 bg-red-700 rounded">CRITICAL</button>
  </div>

  <!-- STATS -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 text-center">

    <div class="bg-green-900 p-3 rounded">
      LOW
      <div class="text-xl">{{ count('LOW') }}</div>
    </div>

    <div class="bg-yellow-700 p-3 rounded text-black">
      MEDIUM
      <div class="text-xl">{{ count('MEDIUM') }}</div>
    </div>

    <div class="bg-orange-700 p-3 rounded">
      HIGH
      <div class="text-xl">{{ count('HIGH') }}</div>
    </div>

    <div class="bg-red-800 p-3 rounded">
      CRITICAL
      <div class="text-xl">{{ count('CRITICAL') }}</div>
    </div>

  </div>

  <!-- LOADING -->
  <div *ngIf="loading" class="text-gray-400 mb-4">
    Establishing ATC data link...
  </div>

  <!-- ERROR -->
  <div *ngIf="error" class="text-red-500 mb-4">
    {{ error }}
  </div>

  <!-- EVENTS -->
  <div class="space-y-3">
    <app-event-card
      *ngFor="let event of filteredEvents"
      [event]="event"
      (ack)="acknowledge($event)"
      (resolve)="resolve($event)">
    </app-event-card>
  </div>

</div>
