<div class="dashboard">

  <!-- HEADER (same surface system as cards) -->
  <div class="surface header">
    ✈ ATC EVENT MONITOR
  </div>

  <!-- FILTER BAR -->
  <div class="surface status-bar">

    <div class="filter-btn"
         [class.active]="selectedSeverity==='ALL'"
         (click)="setSeverityFilter('ALL')">ALL</div>

    <div class="filter-btn"
         [class.active]="selectedSeverity==='LOW'"
         (click)="setSeverityFilter('LOW')">LOW</div>

    <div class="filter-btn"
         [class.active]="selectedSeverity==='MEDIUM'"
         (click)="setSeverityFilter('MEDIUM')">MEDIUM</div>

    <div class="filter-btn"
         [class.active]="selectedSeverity==='HIGH'"
         (click)="setSeverityFilter('HIGH')">HIGH</div>

    <div class="filter-btn"
         [class.active]="selectedSeverity==='CRITICAL'"
         (click)="setSeverityFilter('CRITICAL')">CRITICAL</div>

  </div>

  <!-- MAIN GRID (IMPORTANT: SAME WIDTH SYSTEM AS CARDS) -->
  <div class="main-layout">

    <!-- STATS PANEL -->
    <div class="surface stats">

      <div class="stat-box stat-low">
        <div class="label">LOW</div>
        <div class="value">{{ count('LOW') }}</div>
      </div>

      <div class="stat-box stat-med">
        <div class="label">MEDIUM</div>
        <div class="value">{{ count('MEDIUM') }}</div>
      </div>

      <div class="stat-box stat-high">
        <div class="label">HIGH</div>
        <div class="value">{{ count('HIGH') }}</div>
      </div>

      <div class="stat-box stat-critical">
        <div class="label">CRITICAL</div>
        <div class="value">{{ count('CRITICAL') }}</div>
      </div>

    </div>

    <!-- FEED PANEL -->
    <div class="surface feed">

      <div *ngIf="loading" class="loading">
        Connecting to ATC data link...
      </div>

      <div *ngIf="error" class="error">
        {{ error }}
      </div>

      <div *ngIf="!loading && !error && filteredEvents.length === 0"
           class="empty">
        No flight events detected
      </div>

      <app-event-card
        *ngFor="let event of filteredEvents; trackBy: trackByEventId"
        [event]="event"
        (acknowledge)="acknowledge($event)"
        (resolve)="resolve($event)">
      </app-event-card>

    </div>

  </div>

</div>
